name: Foundry

on:
  push:
    branches:
      - main
  pull_request:
  workflow_dispatch:

jobs:
  fmt:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          submodules: recursive

      - name: Install Foundry
        uses: foundry-rs/foundry-toolchain@8789b3e21e6c11b2697f5eb56eddae542f746c10 # v1

      - name: Run forge fmt
        run: forge fmt src test script certora --check

  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          submodules: recursive

      - name: Install Foundry
        uses: foundry-rs/foundry-toolchain@8789b3e21e6c11b2697f5eb56eddae542f746c10 # v1

      - name: Install solc versions
        run: |
          set -euo pipefail
          install_solc() {
            version="$1"
            checksum="$2"
            dir="$HOME/.svm/$version"
            bin="$dir/solc-$version"
            mkdir -p "$dir"
            if [ ! -x "$bin" ] || ! echo "$checksum  $bin" | sha256sum --check --status; then
              tmp="$(mktemp)"
              curl -fsSL "https://github.com/ethereum/solidity/releases/download/v$version/solc-static-linux" -o "$tmp"
              echo "$checksum  $tmp" | sha256sum --check
              mv "$tmp" "$bin"
              chmod +x "$bin"
            fi
          }
          install_solc 0.8.19 7a5c1d3dc9a8eba62bb2ec37192c9178ae5fe8a54a56e5573fd3c9c17cd9eb48
          install_solc 0.8.21 f2857a898be15c69e8de5598dcd3f3e169e94964a0ce9a0bbb1b111f145a81df
          install_solc 0.8.26 d5f23436f443edb85d8e76906d12f0a86ce0490e7663a9e608efeb7a93f149ef
          install_solc 0.8.28 9a0fb7e0db2c0641dbae1c5cc645dc686820c83af516226abb1c0a2f76636f25

      - name: Run forge lint
        run: forge lint src certora --deny notes

  sizes:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          submodules: recursive

      - name: Install Foundry
        uses: foundry-rs/foundry-toolchain@8789b3e21e6c11b2697f5eb56eddae542f746c10 # v1

      - name: Install solc versions
        run: |
          set -euo pipefail
          install_solc() {
            version="$1"
            checksum="$2"
            dir="$HOME/.svm/$version"
            bin="$dir/solc-$version"
            mkdir -p "$dir"
            if [ ! -x "$bin" ] || ! echo "$checksum  $bin" | sha256sum --check --status; then
              tmp="$(mktemp)"
              curl -fsSL "https://github.com/ethereum/solidity/releases/download/v$version/solc-static-linux" -o "$tmp"
              echo "$checksum  $tmp" | sha256sum --check
              mv "$tmp" "$bin"
              chmod +x "$bin"
            fi
          }
          install_solc 0.8.19 7a5c1d3dc9a8eba62bb2ec37192c9178ae5fe8a54a56e5573fd3c9c17cd9eb48
          install_solc 0.8.21 f2857a898be15c69e8de5598dcd3f3e169e94964a0ce9a0bbb1b111f145a81df
          install_solc 0.8.26 d5f23436f443edb85d8e76906d12f0a86ce0490e7663a9e608efeb7a93f149ef
          install_solc 0.8.28 9a0fb7e0db2c0641dbae1c5cc645dc686820c83af516226abb1c0a2f76636f25

      - name: Run forge build
        run: forge build --force --sizes

  test:
    needs: sizes
    strategy:
      fail-fast: true
      matrix:
        decimals: [0, 6, 8, 18, 24]
        isolate: [true, false]

    runs-on: ubuntu-latest
    name: "test (${{ matrix.decimals }} decimals, isolate: ${{ matrix.isolate }})"
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          submodules: recursive

      - name: Install Foundry
        uses: foundry-rs/foundry-toolchain@8789b3e21e6c11b2697f5eb56eddae542f746c10 # v1

      - name: Install solc versions
        run: |
          set -euo pipefail
          install_solc() {
            version="$1"
            checksum="$2"
            dir="$HOME/.svm/$version"
            bin="$dir/solc-$version"
            mkdir -p "$dir"
            if [ ! -x "$bin" ] || ! echo "$checksum  $bin" | sha256sum --check --status; then
              tmp="$(mktemp)"
              curl -fsSL "https://github.com/ethereum/solidity/releases/download/v$version/solc-static-linux" -o "$tmp"
              echo "$checksum  $tmp" | sha256sum --check
              mv "$tmp" "$bin"
              chmod +x "$bin"
            fi
          }
          install_solc 0.8.19 7a5c1d3dc9a8eba62bb2ec37192c9178ae5fe8a54a56e5573fd3c9c17cd9eb48
          install_solc 0.8.21 f2857a898be15c69e8de5598dcd3f3e169e94964a0ce9a0bbb1b111f145a81df
          install_solc 0.8.26 d5f23436f443edb85d8e76906d12f0a86ce0490e7663a9e608efeb7a93f149ef
          install_solc 0.8.28 9a0fb7e0db2c0641dbae1c5cc645dc686820c83af516226abb1c0a2f76636f25

      - name: Run forge tests with a ${{ matrix.decimals }} decimals underlying asset
        run: if [ ${{ matrix.isolate }} = true ]; then forge test -vvv --isolate; else forge test -vvv; fi
        env:
          DECIMALS: ${{ matrix.decimals }}
